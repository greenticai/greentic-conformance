name: CI

on:
  workflow_call:
  pull_request: {}
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/pr-ci.yml@main
    with:
      variant: host
      # Preserve pre-existing clippy/test shape. NOT using pr-ci.yml defaults
      # (which add --all-features to clippy) because the host shim deps
      # (greentic_pack / greentic_secrets) hit pre-existing unresolved-crate
      # errors under --all-features on clippy; the lane has been red on main
      # since ~2026-04-02 and the shim fix is outside this migration's scope.
      clippy-args: "--workspace --all-targets -- -D warnings"
      test-args: "--workspace --all-features -- --nocapture"
      # TenantContext::detect() requires these in CI (env.rs). Previously set
      # at workflow-env scope in the pre-reusable ci.yml.
      setup-script: |
        echo "TENANT_ID=ci-tenant" >> "$GITHUB_ENV"
        echo "TEAM_ID=ci-team" >> "$GITHUB_ENV"
        echo "USER_ID=ci-user" >> "$GITHUB_ENV"

  oauth:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lane: [mock, live]
    env:
      OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
      OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
      OAUTH_GOOGLE_REDIRECT_URI: ${{ secrets.OAUTH_GOOGLE_REDIRECT_URI }}
      OAUTH_MICROSOFT_CLIENT_ID: ${{ secrets.OAUTH_MICROSOFT_CLIENT_ID }}
      OAUTH_MICROSOFT_CLIENT_SECRET: ${{ secrets.OAUTH_MICROSOFT_CLIENT_SECRET }}
      OAUTH_MICROSOFT_REDIRECT_URI: ${{ secrets.OAUTH_MICROSOFT_REDIRECT_URI }}
      OAUTH_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
      OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
      OAUTH_GITHUB_REDIRECT_URI: ${{ secrets.OAUTH_GITHUB_REDIRECT_URI }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: cargo test (oauth mock)
        if: matrix.lane == 'mock'
        env:
          CI_ENABLE_OAUTH_MOCK: "1"
        run: cargo test --test oauth --features oauth -- --nocapture

      - name: cargo test (oauth live)
        if: matrix.lane == 'live'
        env:
          CI_ENABLE_OAUTH_LIVE: "1"
        run: |
          if [[ -z "${OAUTH_GOOGLE_CLIENT_ID}" && -z "${OAUTH_MICROSOFT_CLIENT_ID}" && -z "${OAUTH_GITHUB_CLIENT_ID}" ]]; then
            echo "No live OAuth credentials set; skipping oauth-live lane."
            exit 0
          fi
          cargo test --test oauth --features oauth -- --nocapture
