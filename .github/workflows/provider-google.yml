name: provider-google

on:
  workflow_dispatch:
  schedule:
    - cron: "41 3 * * *"
  # pull_request: removed per plans/binary-bifurcation.md Phase A heavy-job sweep

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  google-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOOGLE_SA_JSON_B64: ${{ secrets.GOOGLE_SA_JSON_B64 }}
      GOOGLE_SCOPE: ${{ secrets.GOOGLE_SCOPE }}
      TENANT_ID: ci-tenant
      TEAM_ID: ci-team
      USER_ID: ci-user
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.86.0

      - name: Run Google provider smoke test
        if: ${{ env.GOOGLE_SA_JSON_B64 != '' }}
        run: cargo test --test provider_google -- --ignored --test-threads=1 google_service_account_jwt_bearer_smoke

      - name: Skip (no Google secrets)
        if: ${{ env.GOOGLE_SA_JSON_B64 == '' }}
        run: echo "Google service account secrets not configured; skipping provider smoke test."
